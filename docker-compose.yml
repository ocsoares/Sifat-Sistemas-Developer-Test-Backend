services:
  mysql:
    image: mysql:8.0
    container_name: sifat-sistemas-developer-test-backend-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - sifat_mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  sifat_mysql_data: